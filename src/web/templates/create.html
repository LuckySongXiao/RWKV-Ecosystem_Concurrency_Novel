<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小说创作 - RWKV 小说共创</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0a1a; color: #e0e0e0; }
        .nav { display: flex; background: #1a1a2e; padding: 12px 24px; gap: 24px; border-bottom: 1px solid #333; }
        .nav a { color: #7b8cff; text-decoration: none; font-size: 15px; padding: 6px 12px; border-radius: 6px; }
        .nav a:hover { background: #2a2a4e; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { font-size: 24px; color: #7b8cff; margin-bottom: 16px; }
        .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .btn { background: #7b8cff; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; margin: 2px; }
        .btn:hover { background: #5a6cff; }
        .btn.sm { padding: 4px 12px; font-size: 12px; }
        .btn.success { background: #2ed573; }
        .btn.warn { background: #ffa502; color: #1a1a2e; }
        .btn.danger { background: #ff4757; }

        /* 逐条设定字段 */
        .field-group { margin-bottom: 16px; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 16px; background: #111122; }
        .field-group.filled { border-color: #2ed573; }
        .field-group.empty { border-color: #ff4757; border-style: dashed; }
        .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .field-label { color: #a0a8ff; font-size: 14px; font-weight: bold; }
        .field-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .field-status.filled { background: #1a3a2a; color: #2ed573; }
        .field-status.empty { background: #3a1a1a; color: #ff4757; }
        .field-actions { display: flex; gap: 4px; align-items: center; }
        .field-input { width: 100%; background: #0a0a15; border: 1px solid #333; color: #e0e0e0; padding: 10px; border-radius: 6px; font-size: 13px; font-family: 'Consolas', 'Microsoft YaHei', monospace; line-height: 1.5; resize: vertical; }
        .field-input:focus { border-color: #7b8cff; outline: none; }
        .field-input.single { resize: none; height: 36px; }
        .field-hint { color: #555; font-size: 11px; margin-top: 4px; }

        /* 题材选择 */
        .genre-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
        .genre-bar label { color: #a0a8ff; font-size: 13px; font-weight: bold; margin-right: 4px; }
        .genre-chip { padding: 4px 12px; background: #2a2a4e; border: 1px solid #444; border-radius: 12px; cursor: pointer; font-size: 12px; color: #aaa; transition: all 0.2s; }
        .genre-chip:hover { border-color: #7b8cff; color: #7b8cff; }
        .genre-chip.active { background: #7b8cff; color: #fff; border-color: #7b8cff; }

        /* 状态栏 */
        .status-bar { background: #16213e; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .status-bar .state { font-size: 14px; }
        .status-bar .state.running { color: #2ed573; }
        .status-bar .state.paused { color: #ffa502; }

        /* Tab */
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab { padding: 8px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #888; }
        .tab.active { background: #2a2a4e; color: #7b8cff; border-color: #7b8cff; }

        /* 大纲查看 */
        .outline-view { background: #0d0d1a; border: 1px solid #333; border-radius: 6px; padding: 12px; max-height: 400px; overflow-y: auto; font-size: 13px; white-space: pre-wrap; }

        /* 全局操作栏 */
        .global-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

        /* 角色导入 */
        .char-import-area { margin-top: 8px; }
        .char-import-input { width: 100%; background: #0a0a15; border: 1px solid #333; color: #e0e0e0; padding: 8px; border-radius: 6px; font-size: 12px; resize: vertical; min-height: 60px; }
        .char-import-input:focus { border-color: #7b8cff; outline: none; }
        .char-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .char-table th { background: #1a1a2e; color: #a0a8ff; padding: 6px 8px; text-align: left; border-bottom: 1px solid #333; }
        .char-table td { padding: 5px 8px; border-bottom: 1px solid #222; vertical-align: top; }
        .char-table tr:hover td { background: #111122; }
        .char-table .incomplete { color: #ff4757; }
        .char-table .complete { color: #2ed573; }
        .char-detail { color: #888; font-size: 11px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">首页</a>
        <a href="/create" style="background:#2a2a4e">小说创作</a>
        <a href="/pipeline">管线控制</a>
        <a href="/world">世界状态</a>
        <a href="/roleplay">角色扮演</a>
        <a href="/review">审核裁决</a>
    </nav>
    <div class="container">
        <h1>小说创作</h1>

        <div class="status-bar">
            <span class="state" id="pipeline-state">管线状态: 未知</span>
            <span>
                <button class="btn success" onclick="startPipeline()">启动创作管线</button>
                <button class="btn" onclick="resumePipeline()">断点恢复</button>
            </span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('fields')">设定编辑</div>
            <div class="tab" onclick="switchTab('style')">写作风格</div>
            <div class="tab" onclick="switchTab('outline')">生成大纲</div>
        </div>

        <!-- 逐条设定编辑 -->
        <div id="tab-fields">
            <div class="genre-bar">
                <label>题材:</label>
                <span class="genre-chip" data-genre="仙侠" onclick="selectGenre(this)">仙侠</span>
                <span class="genre-chip" data-genre="玄幻" onclick="selectGenre(this)">玄幻</span>
                <span class="genre-chip" data-genre="科幻" onclick="selectGenre(this)">科幻</span>
                <span class="genre-chip" data-genre="都市" onclick="selectGenre(this)">都市</span>
                <span class="genre-chip" data-genre="武侠" onclick="selectGenre(this)">武侠</span>
                <span class="genre-chip" data-genre="历史" onclick="selectGenre(this)">历史</span>
                <span class="genre-chip" data-genre="悬疑" onclick="selectGenre(this)">悬疑</span>
                <span class="genre-chip" data-genre="奇幻" onclick="selectGenre(this)">奇幻</span>
            </div>

            <div class="global-actions">
                <button class="btn warn" onclick="autoFillAllTemplate()">模板一键补全</button>
                <button class="btn success" onclick="autoFillAllAI()">AI并发补全</button>
                <button class="btn" onclick="saveAllFields()">保存全部</button>
            </div>

            <div id="fields-container">加载中...</div>
        </div>

        <!-- 写作风格 -->
        <div id="tab-style" class="card" style="display:none">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="color:#a0a8ff;font-size:15px;font-weight:bold">写作风格约束 (style-guide.md)</span>
                <button class="btn sm warn" onclick="autoFillStyle()">AI补全风格</button>
            </div>
            <textarea id="style-editor" rows="12" placeholder="请在此编写写作风格约束..."></textarea>
            <div style="margin-top:8px">
                <button class="btn success" onclick="saveStyle()">保存风格</button>
                <span id="style-status" style="color:#666;font-size:12px;margin-left:8px"></span>
            </div>
        </div>

        <!-- 大纲 -->
        <div id="tab-outline" class="card" style="display:none">
            <div style="color:#a0a8ff;font-size:15px;font-weight:bold;margin-bottom:8px">已生成的大纲</div>
            <div class="outline-view" id="outline-view">大纲尚未生成。请先编写设定文档，然后启动创作管线。</div>
        </div>
    </div>

    <script>
        let selectedGenre = '';
        let fieldsData = [];
        let importedCharacters = [];  // 角色批量导入数据

        function selectGenre(el) {
            document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedGenre = el.dataset.genre;
            // 同步到题材字段
            const genreInput = document.getElementById('field-genre');
            if (genreInput) genreInput.value = selectedGenre;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-fields').style.display = tab === 'fields' ? '' : 'none';
            document.getElementById('tab-style').style.display = tab === 'style' ? '' : 'none';
            document.getElementById('tab-outline').style.display = tab === 'outline' ? '' : 'none';
            if (tab === 'outline') loadOutline();
        }

        // ---- 加载结构化字段 ----
        async function loadFields() {
            try {
                const r = await fetch('/api/context/spec/fields');
                fieldsData = await r.json();
                renderFields(fieldsData);
            } catch(e) {
                document.getElementById('fields-container').textContent = '加载失败';
            }
        }

        function renderFields(fields) {
            const container = document.getElementById('fields-container');
            container.innerHTML = '';

            fields.forEach(f => {
                const isEmpty = f.is_empty;
                const group = document.createElement('div');
                group.className = 'field-group ' + (isEmpty ? 'empty' : 'filled');
                group.id = 'group-' + f.key;

                const header = document.createElement('div');
                header.className = 'field-header';

                const labelSpan = document.createElement('span');
                labelSpan.className = 'field-label';
                labelSpan.textContent = f.label;

                const actions = document.createElement('div');
                actions.className = 'field-actions';

                const statusSpan = document.createElement('span');
                statusSpan.className = 'field-status ' + (isEmpty ? 'empty' : 'filled');
                statusSpan.textContent = isEmpty ? '未填写' : '已填写';
                statusSpan.id = 'status-' + f.key;

                actions.appendChild(statusSpan);

                if (f.auto_fillable) {
                    const fillBtn = document.createElement('button');
                    fillBtn.className = 'btn sm warn';
                    fillBtn.textContent = 'AI补全';
                    fillBtn.onclick = () => autoFillField(f.key);
                    actions.appendChild(fillBtn);
                }

                header.appendChild(labelSpan);
                header.appendChild(actions);
                group.appendChild(header);

                const input = document.createElement('textarea');
                input.className = 'field-input' + (f.multiline ? '' : ' single');
                input.id = 'field-' + f.key;
                input.value = f.value;
                input.placeholder = f.placeholder;
                input.rows = f.multiline ? 4 : 1;
                input.oninput = () => {
                    // 实时更新状态
                    const val = input.value.trim();
                    const st = document.getElementById('status-' + f.key);
                    const grp = document.getElementById('group-' + f.key);
                    if (val && !isPlaceholderClient(val)) {
                        st.className = 'field-status filled';
                        st.textContent = '已填写';
                        grp.className = 'field-group filled';
                    } else {
                        st.className = 'field-status empty';
                        st.textContent = '未填写';
                        grp.className = 'field-group empty';
                    }
                };
                group.appendChild(input);

                const hint = document.createElement('div');
                hint.className = 'field-hint';
                hint.textContent = f.placeholder;
                group.appendChild(hint);

                // 为 characters 字段添加批量导入区域
                if (f.key === 'characters') {
                    const importArea = document.createElement('div');
                    importArea.className = 'char-import-area';
                    importArea.innerHTML = `
                        <div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">
                            <button class="btn sm" onclick="toggleCharImport()">批量导入角色</button>
                            <button class="btn sm warn" onclick="prefillCharIdentity()">模板预填身份</button>
                            <button class="btn sm success" onclick="fillAllCharsAI()">AI并发补全</button>
                            <button class="btn sm" onclick="saveCharToField()">保存到设定</button>
                        </div>
                        <div id="char-import-box" style="display:none">
                            <textarea id="char-import-input" class="char-import-input" rows="4"
                                placeholder="每行一个角色，格式：角色名 性别&#10;例如：&#10;林孤云 男&#10;苏芸 女&#10;枯影道人 男&#10;&#10;也支持：林孤云(男), 苏芸(女)"></textarea>
                            <div style="margin-top:4px">
                                <button class="btn sm success" onclick="importCharacters()">导入</button>
                            </div>
                        </div>
                        <div id="char-table-container"></div>
                    `;
                    group.appendChild(importArea);
                }

                container.appendChild(group);
            });

            // 自动检测题材
            const genreField = fields.find(f => f.key === 'genre');
            if (genreField && genreField.value) {
                document.querySelectorAll('.genre-chip').forEach(c => {
                    if (genreField.value.includes(c.dataset.genre)) c.classList.add('active');
                    selectedGenre = c.dataset.genre;
                });
            }
        }

        function isPlaceholderClient(text) {
            if (!text) return true;
            if (/（请在此处填写/.test(text)) return true;
            if (/TODO|TBD|待填写/.test(text)) return true;
            return false;
        }

        // ---- 角色批量导入 ----
        function toggleCharImport() {
            const box = document.getElementById('char-import-box');
            box.style.display = box.style.display === 'none' ? '' : 'none';
        }

        function renderCharTable() {
            const container = document.getElementById('char-table-container');
            if (!container) return;
            if (importedCharacters.length === 0) {
                container.innerHTML = '';
                return;
            }
            let html = '<table class="char-table"><tr><th>姓名</th><th>性别</th><th>身份</th><th>性格</th><th>实力</th><th>类型</th><th>操作</th></tr>';
            importedCharacters.forEach((c, i) => {
                const cls = c.is_complete ? 'complete' : 'incomplete';
                const personality = Array.isArray(c.personality) ? c.personality.join('、') : (c.personality || '');
                html += `<tr>
                    <td><b>${c.name}</b></td>
                    <td>${c.gender || '-'}</td>
                    <td class="${cls}">${c.identity || '-'}</td>
                    <td class="char-detail">${personality || '-'}</td>
                    <td class="char-detail">${c.initial_power || '-'}</td>
                    <td>${c.role_type || '-'}</td>
                    <td>${!c.is_complete ? `<button class="btn sm warn" onclick="fillSingleChar(${i})">补全</button>` : '✓'}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        async function importCharacters() {
            const text = document.getElementById('char-import-input').value;
            if (!text.trim()) return;
            try {
                const r = await fetch('/api/characters/import', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text, genre: selectedGenre || '仙侠'})
                });
                const d = await r.json();
                importedCharacters = d.characters;
                renderCharTable();
            } catch(e) { console.error('import error:', e); }
        }

        async function prefillCharIdentity() {
            if (importedCharacters.length === 0) return;
            try {
                const r = await fetch('/api/characters/prefill', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({characters: importedCharacters, genre: selectedGenre || '仙侠'})
                });
                const d = await r.json();
                importedCharacters = d.characters;
                renderCharTable();
            } catch(e) { console.error('prefill error:', e); }
        }

        async function fillSingleChar(index) {
            const c = importedCharacters[index];
            if (!c) return;
            // 收集上下文
            let specContext = '';
            fieldsData.forEach(f => {
                const input = document.getElementById('field-' + f.key);
                if (input && input.value.trim() && f.key !== 'characters') {
                    specContext += f.label + ': ' + input.value.trim() + '\n';
                }
            });
            try {
                const r = await fetch('/api/characters/fill_single', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: c.name, gender: c.gender, genre: selectedGenre || '仙侠', spec_context: specContext})
                });
                const d = await r.json();
                if (d.status === 'filled') {
                    importedCharacters[index] = d.character;
                    renderCharTable();
                }
            } catch(e) { console.error('fill_single error:', e); }
        }

        async function fillAllCharsAI() {
            if (importedCharacters.length === 0) return;
            let specContext = '';
            fieldsData.forEach(f => {
                const input = document.getElementById('field-' + f.key);
                if (input && input.value.trim() && f.key !== 'characters') {
                    specContext += f.label + ': ' + input.value.trim() + '\n';
                }
            });
            try {
                const r = await fetch('/api/characters/fill_batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({characters: importedCharacters, genre: selectedGenre || '仙侠', spec_context: specContext})
                });
                const d = await r.json();
                if (d.characters) {
                    importedCharacters = d.characters;
                    renderCharTable();
                }
            } catch(e) { console.error('fill_batch error:', e); }
        }

        async function saveCharToField() {
            if (importedCharacters.length === 0) return;
            try {
                await fetch('/api/characters/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({characters: importedCharacters})
                });
                // 刷新字段显示
                await loadFields();
            } catch(e) { console.error('save error:', e); }
        }

        // ---- 保存单条字段 ----
        async function saveField(key) {
            const input = document.getElementById('field-' + key);
            if (!input) return;
            try {
                await fetch('/api/context/spec/field/' + key, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({value: input.value})
                });
            } catch(e) {}
        }

        // ---- 保存全部字段 ----
        async function saveAllFields() {
            const fields = [];
            fieldsData.forEach(f => {
                const input = document.getElementById('field-' + f.key);
                if (input) fields.push({key: f.key, value: input.value});
            });
            try {
                await fetch('/api/context/spec/fields', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({fields})
                });
            } catch(e) {}
        }

        // ---- 逐条AI补全 ----
        async function autoFillField(key) {
            const btn = event.target;
            btn.textContent = '生成中...';
            btn.disabled = true;

            // 收集当前上下文
            let specContext = '';
            fieldsData.forEach(f => {
                const input = document.getElementById('field-' + f.key);
                if (input && input.value.trim()) {
                    specContext += f.label + ': ' + input.value.trim() + '\n';
                }
            });

            try {
                const r = await fetch('/api/context/auto_fill/' + key, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({genre: selectedGenre || '仙侠', spec_context: specContext})
                });
                const d = await r.json();

                if (d.status === 'filled') {
                    const input = document.getElementById('field-' + key);
                    if (input) input.value = d.value;
                    // 更新状态
                    const st = document.getElementById('status-' + key);
                    const grp = document.getElementById('group-' + key);
                    if (st) { st.className = 'field-status filled'; st.textContent = '已填写'; }
                    if (grp) grp.className = 'field-group filled';
                    // 自动保存
                    await saveField(key);
                }
            } catch(e) {
                console.error('auto_fill error:', e);
            }

            btn.textContent = 'AI补全';
            btn.disabled = false;
        }

        // ---- 模板一键补全 ----
        async function autoFillAllTemplate() {
            // 对每个可补全的字段调用模板补全
            const promises = [];
            fieldsData.forEach(f => {
                if (f.auto_fillable && f.is_empty) {
                    promises.push(autoFillField(f.key));
                }
            });
            await Promise.all(promises);
        }

        // ---- AI并发补全 ----
        async function autoFillAllAI() {
            await saveAllFields();
            // 读取当前spec
            try {
                const r = await fetch('/api/context/spec');
                const d = await r.json();
                const cr = await fetch('/api/context/concurrent_fill', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: d.content || '', genre: selectedGenre})
                });
                const result = await cr.json();
                // 重新加载字段
                await loadFields();
                // 更新风格
                if (result.style_md) {
                    document.getElementById('style-editor').value = result.style_md;
                }
            } catch(e) {
                console.error('concurrent_fill error:', e);
            }
        }

        // ---- 风格 ----
        async function loadStyle() {
            try {
                const r = await fetch('/api/context/style');
                const d = await r.json();
                if (d.exists) document.getElementById('style-editor').value = d.content;
            } catch(e) {}
        }

        async function saveStyle() {
            const content = document.getElementById('style-editor').value;
            const el = document.getElementById('style-status');
            try {
                await fetch('/api/context/style', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content})
                });
                el.textContent = '已保存';
                el.style.color = '#2ed573';
            } catch(e) { el.textContent = '保存失败'; el.style.color = '#ff4757'; }
        }

        async function autoFillStyle() {
            // 使用concurrent_fill的风格部分
            await saveAllFields();
            try {
                const r = await fetch('/api/context/spec');
                const d = await r.json();
                const cr = await fetch('/api/context/concurrent_fill', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: d.content || '', genre: selectedGenre})
                });
                const result = await cr.json();
                if (result.style_md) {
                    document.getElementById('style-editor').value = result.style_md;
                    await saveStyle();
                }
            } catch(e) {}
        }

        // ---- 大纲 ----
        async function loadOutline() {
            try {
                const r = await fetch('/api/output/outline');
                const d = await r.json();
                const el = document.getElementById('outline-view');
                if (d.exists === false) {
                    el.textContent = '大纲尚未生成。请先编写设定文档，然后启动创作管线。';
                } else {
                    el.textContent = JSON.stringify(d, null, 2);
                }
            } catch(e) {
                document.getElementById('outline-view').textContent = '加载失败';
            }
        }

        // ---- 管线控制 ----
        async function startPipeline() {
            await saveAllFields();
            try {
                const r = await fetch('/api/pipeline/start', {method: 'POST'});
                const d = await r.json();
                alert('管线已' + (d.status === 'started' ? '启动' : d.status));
            } catch(e) { alert('启动失败: ' + e); }
        }

        async function resumePipeline() {
            try {
                const r = await fetch('/api/pipeline/resume', {method: 'POST'});
                const d = await r.json();
                alert('管线已' + (d.status === 'resumed' ? '恢复' : d.status));
            } catch(e) { alert('恢复失败: ' + e); }
        }

        async function pollStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                const el = document.getElementById('pipeline-state');
                el.textContent = '管线状态: ' + d.state;
                el.className = 'state ' + d.state;
            } catch(e) {}
        }

        // ---- 初始化 ----
        loadFields();
        loadStyle();
        pollStatus();
        setInterval(pollStatus, 3000);

        // 页面加载后自动检测：如果所有必填字段都有值，自动启动管线
        setTimeout(async () => {
            await loadFields();
            // 检查是否有空的关键字段
            const emptyFields = fieldsData.filter(f => f.is_empty && f.key !== 'outline');
            if (emptyFields.length === 0) {
                // 所有设定已填写，自动启动管线
                try {
                    const r = await fetch('/api/status');
                    const d = await r.json();
                    if (d.state === 'init' || d.state === 'paused') {
                        console.log('All fields filled, auto-starting pipeline...');
                        startPipeline();
                    }
                } catch(e) {}
            }
        }, 2000);
    </script>
</body>
</html>
