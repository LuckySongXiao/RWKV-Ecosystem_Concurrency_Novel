<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>书架 - RWKV 小说共创</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
        .nav { display: flex; background: #1a1a2e; padding: 12px 24px; gap: 8px; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .nav a { color: #7b8cff; text-decoration: none; font-size: 14px; padding: 8px 16px; border-radius: 6px; transition: all .2s; }
        .nav a:hover, .nav a.active { background: #2a2a4e; color: #a0a8ff; }
        h1 { font-size: 24px; color: #7b8cff; margin-bottom: 20px; padding: 0 24px; }

        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 100px); }

        .sidebar { background: #1a1a2e; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar-section { padding: 16px; border-bottom: 1px solid #2a2a3e; }
        .sidebar-section h3 { color: #a0a8ff; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-section h3 .add-btns { display: flex; gap: 4px; }
        .sidebar-section h3 .add-btn { background: none; border: 1px solid #444; color: #7b8cff; cursor: pointer; font-size: 16px; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .sidebar-section h3 .add-btn:hover { border-color: #7b8cff; background: #2a2a4e; }

        .novel-card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 14px; margin: 8px 0; cursor: pointer; transition: all .2s; }
        .novel-card:hover { border-color: #7b8cff; transform: translateY(-1px); }
        .novel-card.active { border-color: #2ed573; background: #1a3a2a; }
        .novel-card .title { color: #a0a8ff; font-weight: bold; font-size: 15px; }
        .novel-card .meta { color: #888; font-size: 12px; margin-top: 4px; }

        .tree-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background .15s; }
        .tree-item:hover { background: #2a2a4e; }
        .tree-item.active { background: #2a4a2e; color: #2ed573; }
        .tree-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
        .tree-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-item .actions { display: none; gap: 2px; flex-shrink: 0; }
        .tree-item:hover .actions { display: flex; }
        .tree-item .act-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 11px; padding: 2px 4px; border-radius: 3px; }
        .tree-item .act-btn:hover { color: #ff4757; background: #2a1a1a; }
        .tree-item .act-btn.rename-btn:hover { color: #ffa502; background: #2a2a1a; }
        .tree-item .act-btn.add-btn:hover { color: #2ed573; background: #1a2a1a; }
        .tree-children { padding-left: 18px; }
        .tree-children.collapsed { display: none; }

        .main-area { display: flex; flex-direction: column; }
        .breadcrumb { background: #1a1a2e; padding: 10px 20px; border-bottom: 1px solid #333; font-size: 13px; color: #888; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .breadcrumb span { color: #7b8cff; cursor: pointer; }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { color: #555; }

        .editor-area { flex: 1; display: flex; flex-direction: column; }
        .editor-toolbar { background: #1a1a2e; padding: 8px 16px; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .toolbar-sep { width: 1px; height: 20px; background: #333; margin: 0 4px; }
        .btn { background: #7b8cff; color: #fff; border: none; padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; transition: all .2s; }
        .btn:hover { background: #5a6cff; }
        .btn.danger { background: #ff4757; }
        .btn.danger:hover { background: #e0354a; }
        .btn.success { background: #2ed573; }
        .btn.success:hover { background: #26c466; }
        .btn.warn { background: #ffa502; color: #1a1a2e; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.small { padding: 5px 10px; font-size: 12px; }
        .btn.outline { background: transparent; border: 1px solid #555; color: #aaa; }
        .btn.outline:hover { border-color: #7b8cff; color: #7b8cff; }
        .btn.outline.active { border-color: #7b8cff; color: #7b8cff; background: #2a2a4e; }

        .editor-container { flex: 1; display: flex; position: relative; overflow: hidden; }
        .editor { width: 100%; height: 100%; background: #0d0d1a; color: #e0e0e0; border: none; padding: 20px; font-size: 14px; line-height: 1.8; font-family: 'Microsoft YaHei', monospace; resize: none; outline: none; }
        .editor:focus { background: #0e0e1e; }

        .md-preview { width: 100%; height: 100%; background: #0d0d1a; color: #e0e0e0; padding: 20px; font-size: 14px; line-height: 1.8; overflow-y: auto; display: none; }
        .md-preview h1 { font-size: 28px; color: #7b8cff; margin: 20px 0 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .md-preview h2 { font-size: 22px; color: #a0a8ff; margin: 16px 0 10px; }
        .md-preview h3 { font-size: 18px; color: #c0c8ff; margin: 14px 0 8px; }
        .md-preview p { margin: 8px 0; }
        .md-preview strong { color: #ffa502; }
        .md-preview em { color: #7b8cff; }
        .md-preview code { background: #1a1a2e; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        .md-preview pre { background: #1a1a2e; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
        .md-preview pre code { background: none; padding: 0; }
        .md-preview blockquote { border-left: 3px solid #7b8cff; padding-left: 12px; color: #aaa; margin: 10px 0; }
        .md-preview ul, .md-preview ol { padding-left: 24px; margin: 8px 0; }
        .md-preview li { margin: 4px 0; }
        .md-preview hr { border: none; border-top: 1px solid #333; margin: 16px 0; }

        .json-editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .json-tabs { display: flex; background: #1a1a2e; border-bottom: 1px solid #333; }
        .json-tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #888; border-bottom: 2px solid transparent; transition: all .2s; }
        .json-tab:hover { color: #a0a8ff; }
        .json-tab.active { color: #7b8cff; border-bottom-color: #7b8cff; }
        .json-tree-view { flex: 1; overflow-y: auto; padding: 16px; background: #0d0d1a; display: none; }
        .json-tree-view .jt-key { color: #7b8cff; }
        .json-tree-view .jt-string { color: #2ed573; }
        .json-tree-view .jt-number { color: #ffa502; }
        .json-tree-view .jt-bool { color: #ff6b81; }
        .json-tree-view .jt-null { color: #888; }
        .json-tree-view .jt-bracket { color: #888; cursor: pointer; user-select: none; }
        .json-tree-view .jt-row { padding: 2px 0; padding-left: 20px; position: relative; }
        .json-tree-view .jt-row:hover { background: #1a1a2e; }
        .json-tree-view .jt-row .jt-toggle { position: absolute; left: 4px; cursor: pointer; color: #555; width: 14px; text-align: center; }
        .json-tree-view .jt-row .jt-toggle:hover { color: #7b8cff; }
        .json-tree-view .jt-row.collapsed > .jt-children { display: none; }
        .json-tree-view .jt-row.collapsed > .jt-toggle::after { content: '▶'; }
        .json-tree-view .jt-row:not(.collapsed) > .jt-toggle::after { content: '▼'; font-size: 10px; }
        .json-tree-view .jt-children { padding-left: 16px; }
        .json-tree-view .jt-edit-btn { opacity: 0; background: none; border: none; color: #7b8cff; cursor: pointer; font-size: 11px; margin-left: 8px; }
        .json-tree-view .jt-row:hover > .jt-edit-btn { opacity: 1; }
        .json-status { padding: 4px 12px; font-size: 12px; background: #1a1a2e; border-top: 1px solid #333; }
        .json-status.valid { color: #2ed573; }
        .json-status.invalid { color: #ff4757; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #555; font-size: 16px; gap: 12px; }
        .empty-state .icon { font-size: 48px; }

        .polish-panel { position: absolute; right: 20px; top: 20px; width: 380px; background: #1a1a2e; border: 1px solid #7b8cff; border-radius: 8px; padding: 16px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,.5); display: none; }
        .polish-panel h3 { color: #a0a8ff; font-size: 15px; margin-bottom: 12px; }
        .polish-panel textarea { width: 100%; height: 80px; background: #0d0d1a; border: 1px solid #333; color: #e0e0e0; padding: 10px; border-radius: 6px; font-size: 13px; resize: vertical; font-family: inherit; }
        .polish-panel .selected-text { background: #0d0d1a; border: 1px solid #333; border-radius: 6px; padding: 10px; margin: 8px 0; font-size: 12px; color: #aaa; max-height: 120px; overflow-y: auto; line-height: 1.5; }
        .polish-panel .result-text { background: #0d1a0d; border: 1px solid #2ed573; border-radius: 6px; padding: 10px; margin: 8px 0; font-size: 13px; color: #2ed573; max-height: 150px; overflow-y: auto; line-height: 1.5; white-space: pre-wrap; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal { background: #1a1a2e; border: 1px solid #7b8cff; border-radius: 8px; padding: 24px; max-width: 440px; width: 90%; }
        .modal.danger-modal { border-color: #ff4757; }
        .modal h3 { color: #a0a8ff; font-size: 16px; margin-bottom: 16px; }
        .modal.danger-modal h3 { color: #ff4757; }
        .modal label { display: block; color: #888; font-size: 13px; margin-bottom: 6px; }
        .modal input[type="text"], .modal select { width: 100%; background: #0d0d1a; border: 1px solid #333; color: #e0e0e0; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; }
        .modal input[type="text"]:focus, .modal select:focus { border-color: #7b8cff; }
        .modal .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
        .modal p { color: #aaa; font-size: 14px; margin-bottom: 16px; line-height: 1.6; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 6px; font-size: 14px; z-index: 9999; animation: slideIn .3s ease; }
        .toast.success { background: #2ed573; color: #1a1a2e; }
        .toast.error { background: #ff4757; color: #fff; }
        .toast.info { background: #7b8cff; color: #fff; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .file-info { font-size: 12px; color: #666; margin-left: auto; }
        .modified { color: #ffa502 !important; }

        .dir-context-menu { position: absolute; background: #1a1a2e; border: 1px solid #444; border-radius: 6px; padding: 4px 0; z-index: 150; min-width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
        .dir-context-menu .ctx-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #ccc; display: flex; align-items: center; gap: 8px; }
        .dir-context-menu .ctx-item:hover { background: #2a2a4e; color: #7b8cff; }
        .dir-context-menu .ctx-item.danger:hover { background: #2a1a1a; color: #ff4757; }
        .dir-context-menu .ctx-sep { height: 1px; background: #333; margin: 4px 0; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">首页</a>
        <a href="/create">小说创作</a>
        <a href="/pipeline">管线控制</a>
        <a href="/bookshelf" class="active">书架</a>
        <a href="/world">世界状态</a>
        <a href="/roleplay">角色扮演</a>
        <a href="/review">审核裁决</a>
    </nav>
    <h1>📚 书架</h1>
    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>
                    我的小说
                    <span class="add-btns">
                        <button class="add-btn" onclick="showNewNovelDialog()" title="新建小说">+</button>
                    </span>
                </h3>
                <div id="novel-list">
                    <div style="color:#666; text-align:center; padding:20px;">加载中...</div>
                </div>
            </div>
            <div class="sidebar-section" id="tree-section" style="display:none;">
                <h3 id="tree-title">
                    目录结构
                    <span class="add-btns">
                        <button class="add-btn" onclick="showNewFileDialog()" title="新建文件">📄</button>
                        <button class="add-btn" onclick="showNewDirDialog()" title="新建文件夹">📁</button>
                    </span>
                </h3>
                <div id="file-tree"></div>
            </div>
        </div>
        <div class="main-area">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="goHome()">书架</span>
            </div>
            <div class="editor-toolbar" id="editor-toolbar" style="display:none;">
                <button class="btn success small" onclick="saveFile()">💾 保存</button>
                <div class="toolbar-sep"></div>
                <button class="btn outline small" id="btn-edit" onclick="switchEditorMode('edit')">编辑</button>
                <button class="btn outline small" id="btn-preview" onclick="switchEditorMode('preview')">预览</button>
                <div class="toolbar-sep" id="json-toolbar-sep" style="display:none;"></div>
                <button class="btn outline small" id="btn-json-tree" onclick="switchJsonMode('tree')" style="display:none;">结构视图</button>
                <button class="btn outline small" id="btn-json-raw" onclick="switchJsonMode('raw')" style="display:none;">源码视图</button>
                <button class="btn outline small" id="btn-json-format" onclick="formatJson()" style="display:none;">格式化</button>
                <div class="toolbar-sep"></div>
                <button class="btn warn small" onclick="openPolishPanel()">✨ 润色</button>
                <button class="btn outline small" onclick="showRenameDialog()">✏️ 重命名</button>
                <button class="btn danger small" onclick="confirmDelete()">🗑 删除</button>
                <span class="file-info" id="file-info"></span>
            </div>
            <div class="editor-area">
                <div class="empty-state" id="empty-state">
                    <div class="icon">📖</div>
                    <div>从左侧选择一本小说开始阅读或编辑</div>
                </div>
                <div class="editor-container" id="editor-container" style="display:none;">
                    <textarea class="editor" id="editor" spellcheck="false"></textarea>
                    <div class="md-preview" id="md-preview"></div>
                    <div class="json-editor-wrap" id="json-editor-wrap" style="display:none;">
                        <div class="json-tree-view" id="json-tree-view"></div>
                        <div class="json-status" id="json-status"></div>
                    </div>
                    <div class="polish-panel" id="polish-panel">
                        <h3>✨ 文本润色</h3>
                        <div class="selected-text" id="polish-selected">未选中文本</div>
                        <label style="color:#a0a8ff; font-size:12px; display:block; margin:8px 0 4px;">润色要求</label>
                        <textarea id="polish-instructions" placeholder="请输入润色要求，如：&#10;- 增加环境描写&#10;- 使对话更生动&#10;- 加强情感表达"></textarea>
                        <div style="margin-top:8px; display:flex; gap:8px;">
                            <button class="btn small" onclick="previewPolish()">预览润色</button>
                            <button class="btn success small" onclick="applyPolish()">应用润色</button>
                            <button class="btn danger small" onclick="closePolishPanel()">取消</button>
                        </div>
                        <div class="result-text" id="polish-result" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let novels = [];
        let currentNovelDir = '';
        let currentNovelName = '';
        let currentFilePath = '';
        let currentFileName = '';
        let originalContent = '';
        let isModified = false;
        let polishedText = '';
        let treeData = [];
        let editorMode = 'edit';
        let jsonMode = 'tree';
        let currentFileType = '';
        let contextMenuDir = '';

        function getFileType(name) {
            if (name.endsWith('.md')) return 'md';
            if (name.endsWith('.json')) return 'json';
            return 'text';
        }

        async function loadNovels() {
            try {
                const r = await fetch('/api/novel/dirs');
                const d = await r.json();
                novels = d.novels || [];
                renderNovelList();
            } catch(e) {
                document.getElementById('novel-list').innerHTML = '<div style="color:#ff4757; text-align:center; padding:20px;">加载失败</div>';
            }
        }

        function renderNovelList() {
            const el = document.getElementById('novel-list');
            if (!novels.length) {
                el.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">暂无小说<br><small>请先运行管线生成</small></div>';
                return;
            }
            let html = '';
            novels.forEach((n, idx) => {
                const displayName = n.name.replace('草稿_', '');
                const active = n.path === currentNovelDir ? 'active' : '';
                html += `<div class="novel-card ${active}" onclick="selectNovel(${idx})">
                    <div class="title">📖 ${displayName}</div>
                    <div class="meta">${n.name}</div>
                </div>`;
            });
            el.innerHTML = html;
        }

        async function selectNovel(idx) {
            const n = novels[idx];
            if (!n) return;
            currentNovelDir = n.path;
            currentNovelName = n.name.replace('草稿_', '');
            renderNovelList();
            updateBreadcrumb([currentNovelName]);
            await loadTree();
        }

        async function loadTree() {
            if (!currentNovelDir) return;
            document.getElementById('tree-section').style.display = 'block';
            document.getElementById('tree-title').childNodes[0].textContent = currentNovelName + ' - 目录 ';
            document.getElementById('file-tree').innerHTML = '<div style="color:#666; padding:10px;">加载中...</div>';

            try {
                const r = await fetch('/api/novel/tree?dir=' + encodeURIComponent(currentNovelDir));
                const d = await r.json();
                treeData = d.tree || [];
                renderTree();
            } catch(e) {
                document.getElementById('file-tree').innerHTML = '<div style="color:#ff4757; padding:10px;">加载失败</div>';
            }
        }

        function renderTree() {
            const el = document.getElementById('file-tree');
            el.innerHTML = buildTreeHTML(treeData, 0);
        }

        function buildTreeHTML(items, depth) {
            if (!items || !items.length) return '';
            let html = '';
            items.forEach((item, idx) => {
                const uid = 'ti_' + depth + '_' + idx;
                if (item.type === 'dir') {
                    const hasChildren = item.children && item.children.length > 0;
                    const icon = hasChildren ? '📂' : '📁';
                    html += `<div class="tree-item" id="${uid}" onclick="toggleDir(this, event)" data-path="${escapeAttr(item.path)}" data-name="${escapeAttr(item.name)}" data-type="dir">
                        <span class="icon">${icon}</span>
                        <span class="name">${item.name}</span>
                        <span class="actions">
                            <button class="act-btn add-btn" data-action="new-file" data-uid="${uid}" title="新建文件">+</button>
                            <button class="act-btn rename-btn" data-action="rename" data-uid="${uid}" title="重命名">✎</button>
                            <button class="act-btn" data-action="delete" data-uid="${uid}" title="删除">✕</button>
                        </span>
                    </div>`;
                    if (hasChildren) {
                        html += `<div class="tree-children">${buildTreeHTML(item.children, depth + 1)}</div>`;
                    }
                } else {
                    const icon = getFileIcon(item.name);
                    html += `<div class="tree-item" id="${uid}" onclick="openFileByUid('${uid}', event)" data-path="${escapeAttr(item.path)}" data-name="${escapeAttr(item.name)}" data-type="file">
                        <span class="icon">${icon}</span>
                        <span class="name">${item.name}</span>
                        <span class="actions">
                            <button class="act-btn rename-btn" data-action="rename" data-uid="${uid}" title="重命名">✎</button>
                            <button class="act-btn" data-action="delete" data-uid="${uid}" title="删除">✕</button>
                        </span>
                    </div>`;
                }
            });
            return html;
        }

        function getFileIcon(name) {
            if (name.endsWith('.md')) return '📝';
            if (name.endsWith('.json')) return '📋';
            if (name.endsWith('.txt')) return '📄';
            return '📄';
        }

        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function getUidData(uid) {
            const el = document.getElementById(uid);
            if (!el) return null;
            return { path: el.dataset.path, name: el.dataset.name, type: el.dataset.type, el: el };
        }

        function openFileByUid(uid, event) {
            if (event) event.stopPropagation();
            const d = getUidData(uid);
            if (!d) return;
            openFile(d.path, d.name);
        }

        document.getElementById('file-tree').addEventListener('click', function(e) {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            e.stopPropagation();
            const uid = btn.dataset.uid;
            const d = getUidData(uid);
            if (!d) return;
            const action = btn.dataset.action;
            if (action === 'new-file') showNewFileDialogIn(d.path, null);
            else if (action === 'rename') showRenameItemDialog(d.path, d.name, null);
            else if (action === 'delete') confirmDeleteItem(d.path, d.name, d.type, null);
        });

        document.getElementById('file-tree').addEventListener('contextmenu', function(e) {
            const item = e.target.closest('.tree-item[data-type="dir"]');
            if (!item) return;
            e.preventDefault();
            e.stopPropagation();
            closeContextMenu();
            const path = item.dataset.path;
            const name = item.dataset.name;
            showDirContextAt(e, path, name);
        });

        function showDirContextAt(event, path, name) {
            const menu = document.createElement('div');
            menu.className = 'dir-context-menu';
            menu.id = 'dir-context-menu';
            menu.innerHTML = `
                <div class="ctx-item" data-ctx="new-file" data-path="${escapeAttr(path)}">📄 新建文件</div>
                <div class="ctx-item" data-ctx="new-dir" data-path="${escapeAttr(path)}">📁 新建文件夹</div>

        function renderMarkdownPreview() {
            const content = document.getElementById('editor').value;
            const preview = document.getElementById('md-preview');
            let html = content
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^---$/gm, '<hr>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p><h([1-3])>/g, '<h$1>').replace(/<\/h([1-3])><\/p>/g, '</h$1>');
            html = html.replace(/<p><hr><\/p>/g, '<hr>');
            html = html.replace(/<p><blockquote>/g, '<blockquote>').replace(/<\/blockquote><\/p>/g, '</blockquote>');
            preview.innerHTML = html;
        }

        function renderJsonTree() {
            const content = document.getElementById('editor').value;
            const treeView = document.getElementById('json-tree-view');
            const statusEl = document.getElementById('json-status');

            try {
                const obj = JSON.parse(content);
                statusEl.textContent = '✓ JSON 格式有效';
                statusEl.className = 'json-status valid';
                treeView.innerHTML = buildJsonTreeHTML(obj, '');
            } catch(e) {
                statusEl.textContent = '✗ JSON 格式无效: ' + e.message;
                statusEl.className = 'json-status invalid';
                treeView.innerHTML = '<div style="color:#ff4757; padding:16px;">JSON 解析失败，请切换到源码视图修复格式错误。<br><br>错误: ' + escapeHtml(e.message) + '</div>';
            }
        }

        function buildJsonTreeHTML(obj, path, depth) {
            depth = depth || 0;
            if (depth > 20) return '<span class="jt-null">[深度超限]</span>';

            if (obj === null) return '<span class="jt-null">null</span>';
            if (typeof obj === 'boolean') return `<span class="jt-bool">${obj}</span>`;
            if (typeof obj === 'number') return `<span class="jt-number">${obj}</span>`;
            if (typeof obj === 'string') return `<span class="jt-string">"${escapeHtml(obj)}"</span>`;

            const isArray = Array.isArray(obj);
            const entries = isArray ? obj.map((v, i) => [i, v]) : Object.entries(obj);
            const bracket = isArray ? ['[', ']'] : ['{', '}'];
            const count = entries.length;

            let html = `<span class="jt-bracket">${bracket[0]}</span>`;
            if (count === 0) {
                html += `<span class="jt-bracket">${bracket[1]}</span>`;
                return html;
            }

            html += `<div class="jt-children">`;
            entries.forEach(([key, val], idx) => {
                const keyDisplay = isArray ? key : `"${escapeHtml(String(key))}"`;
                const valType = val === null ? 'null' : Array.isArray(val) ? 'array' : typeof val;
                const isObj = val && typeof val === 'object';
                const childPath = path + (path ? '.' : '') + key;
                const collapsed = depth > 2 ? ' collapsed' : '';

                html += `<div class="jt-row${isObj ? collapsed : ''}">`;
                if (isObj) {
                    html += `<span class="jt-toggle" onclick="toggleJsonRow(this)"></span>`;
                } else {
                    html += `<span class="jt-toggle"></span>`;
                }
                if (!isArray) {
                    html += `<span class="jt-key">${keyDisplay}</span>: `;
                } else {
                    html += `<span style="color:#888">${key}</span>: `;
                }
                html += buildJsonTreeHTML(val, childPath, depth + 1);
                if (idx < entries.length - 1) html += ',';
                html += `</div>`;
            });
            html += `</div>`;
            html += `<span class="jt-bracket">${bracket[1]}</span>`;
            return html;
        }

        function toggleJsonRow(el) {
            el.parentElement.classList.toggle('collapsed');

        function escapeHtml(str) {

            const resultEl = document.getElementById('polish-result');
            resultEl.style.display = 'block';
            resultEl.textContent = '润色中...';
            resultEl.style.borderColor = '#7b8cff';
            resultEl.style.color = '#7b8cff';

            try {
                const r = await fetch('/api/polish/preview', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text: selected,
                        polish_instructions: instructions,
                        chapter_title: currentFilePath.split(/[\\\/]/).pop().replace('.md', '')
                    })
                });
                const d = await r.json();
                if (d.error) {
                    resultEl.textContent = '错误: ' + d.error;
                    resultEl.style.borderColor = '#ff4757';
                    resultEl.style.color = '#ff4757';
                } else {
                    polishedText = d.polished || '';
                    resultEl.textContent = polishedText;
                    resultEl.style.borderColor = '#2ed573';
                    resultEl.style.color = '#2ed573';
                }
            } catch(e) {
                resultEl.textContent = '润色失败: ' + e;
                resultEl.style.borderColor = '#ff4757';
                resultEl.style.color = '#ff4757';
            }
        }

        function applyPolish() {
            if (!polishedText) {
                showToast('请先预览润色结果', 'info');
                return;
            }
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const before = editor.value.substring(0, start);
            const after = editor.value.substring(end);
            editor.value = before + polishedText + after;
            isModified = true;
            document.getElementById('file-info').classList.add('modified');
            const name = document.getElementById('file-info').textContent.split(' • ')[0];
            document.getElementById('file-info').textContent = name + ' • 未保存';
            closePolishPanel();
            showToast('润色结果已应用，请保存文件', 'success');
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getOrchestratorOutputDir() {
            if (!novels.length) return null;
            const firstPath = novels[0].path;
            const idx = firstPath.lastIndexOf('草稿_');
            if (idx >= 0) return firstPath.substring(0, idx).replace(/[\\\/]$/, '');
            return null;
        }

        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closePolishPanel();
                closeContextMenu();
            }
        });

        loadNovels();
    </script>
</body>
</html>
