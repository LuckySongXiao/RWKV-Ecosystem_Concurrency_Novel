<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色扮演 - RWKV 小说共创</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
        .nav { display: flex; background: #1a1a2e; padding: 12px 24px; gap: 8px; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .nav a { color: #7b8cff; text-decoration: none; font-size: 14px; padding: 8px 16px; border-radius: 6px; transition: all .2s; }
        .nav a:hover, .nav a.active { background: #2a2a4e; color: #a0a8ff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        h1 { font-size: 24px; color: #7b8cff; margin-bottom: 20px; grid-column: 1 / -1; }
        h2 { font-size: 18px; color: #a0a8ff; margin: 16px 0 12px; }
        .card { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 16px; }
        .main-content { display: flex; flex-direction: column; }
        label { display: block; color: #a0a8ff; margin: 12px 0 6px; font-size: 13px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #0d0d1a; border: 1px solid #333; color: #e0e0e0; padding: 10px; border-radius: 6px; font-size: 14px; font-family: inherit; }
        textarea { height: 80px; resize: vertical; }
        input:focus, textarea:focus, select:focus { border-color: #7b8cff; outline: none; }
        .btn { background: #7b8cff; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px 0 0; transition: all .2s; }
        .btn:hover { background: #5a6cff; }
        .btn.danger { background: #ff4757; }
        .btn.success { background: #2ed573; }
        .btn.warn { background: #ffa502; color: #1a1a2e; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #chat-area { background: #0d0d1a; border: 1px solid #333; border-radius: 6px; padding: 16px; height: 500px; overflow-y: auto; flex: 1; }
        .msg { margin: 12px 0; padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .msg.user { background: #1e3a5f; text-align: right; margin-left: 20%; }
        .msg.character { background: #1a2e1a; margin-right: 20%; }
        .msg .name { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: bold; }
        .char-list { max-height: 350px; overflow-y: auto; }
        .char-item { background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 12px; margin: 8px 0; cursor: pointer; transition: all .2s; }
        .char-item:hover { border-color: #7b8cff; background: #1a2a4e; }
        .char-item.selected { border-color: #2ed573; background: #1a3a2a; }
        .char-item .name { color: #a0a8ff; font-weight: bold; font-size: 14px; }
        .char-item .info { color: #888; font-size: 12px; margin-top: 4px; }
        .char-item .role-badge { display: inline-block; background: #2a2a4e; color: #7b8cff; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px; }
        .char-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .mode-tab { padding: 8px 16px; background: #16213e; border: 1px solid #333; border-radius: 6px; cursor: pointer; color: #888; font-size: 13px; }
        .mode-tab.active { background: #2a2a4e; color: #7b8cff; border-color: #7b8cff; }
        .novel-selector { margin-bottom: 12px; }
        .novel-option { background: #16213e; border: 1px solid #333; border-radius: 6px; padding: 10px 14px; margin: 6px 0; cursor: pointer; transition: all .2s; }
        .novel-option:hover { border-color: #7b8cff; }
        .novel-option.selected { border-color: #2ed573; background: #1a3a2a; }
        .novel-option .title { color: #a0a8ff; font-weight: bold; font-size: 14px; }
        .novel-option .count { color: #888; font-size: 12px; }
        .detail-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2a3e; }
        .detail-row .key { color: #888; font-size: 12px; }
        .detail-row .val { color: #e0e0e0; font-size: 12px; text-align: right; max-width: 180px; }
        .detail-block { margin-top: 8px; padding: 8px; background: #0d0d1a; border-radius: 4px; font-size: 12px; color: #ccc; line-height: 1.5; }
        .loading { text-align: center; padding: 20px; color: #7b8cff; }
    </style>
</head>
<body>
    <nav class="nav" style="grid-column: 1 / -1;">
        <a href="/">首页</a>
        <a href="/create">小说创作</a>
        <a href="/pipeline">管线控制</a>
        <a href="/bookshelf">书架</a>
        <a href="/world">世界状态</a>
        <a href="/roleplay" style="background:#2a2a4e">角色扮演</a>
        <a href="/review">审核裁决</a>
    </nav>
    <h1>🎭 角色扮演</h1>
    <div class="sidebar">
        <div class="card">
            <h2>选择小说</h2>
            <div id="novel-list" class="novel-selector">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
        <div class="card">
            <h2>角色列表</h2>
            <div class="char-list" id="char-list">
                <div class="empty-state">请先选择小说</div>
            </div>
        </div>
        <div class="card" id="char-detail-card" style="display:none;">
            <h2>角色详情</h2>
            <div id="char-detail"></div>
        </div>
        <div class="card">
            <h2>场景设置</h2>
            <label>场景上下文</label>
            <textarea id="scene-context" placeholder="描述当前场景，如：在青云宗大殿中，凌云面对长老的质问..."></textarea>
            <div class="char-actions">
                <button class="btn" onclick="resetSession()">重置会话</button>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="card" style="flex: 1; display: flex; flex-direction: column;">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="setMode('dialogue', this)">对话模式</div>
                <div class="mode-tab" onclick="setMode('monologue', this)">内心独白</div>
            </div>
            <div id="chat-area">
                <div class="empty-state">选择一个角色开始对话...</div>
            </div>
            <div style="margin-top: 12px;">
                <label>用户输入</label>
                <textarea id="user-input" placeholder="对角色说话或描述情境..." style="height: 60px;"></textarea>
                <div style="margin-top: 8px;">
                    <button class="btn success" id="send-btn" onclick="sendMessage()">发送</button>
                    <button class="btn" id="monologue-btn" onclick="sendMonologue()">内心独白</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let selectedCharId = '';
        let selectedCharName = '';
        let currentNovelDir = '';
        let currentNovelName = '';
        let history = '';
        let currentMode = 'dialogue';
        let characters = [];
        let novels = [];
        let isSending = false;

        async function loadNovels() {
            try {
                const r = await fetch('/api/roleplay/novels');
                const d = await r.json();
                novels = d.novels || [];
                renderNovelList();
            } catch(e) {
                document.getElementById('novel-list').innerHTML = '<div class="empty-state">无法加载小说列表</div>';
            }
        }

        function renderNovelList() {
            const el = document.getElementById('novel-list');
            if (!novels.length) {
                el.innerHTML = '<div class="empty-state">暂无小说。请先运行管线生成小说。</div>';
                return;
            }
            let html = '';
            novels.forEach((n, idx) => {
                const selected = n.path === currentNovelDir ? 'selected' : '';
                const displayName = n.name.replace('草稿_', '');
                html += `<div class="novel-option ${selected}" data-idx="${idx}" onclick="selectNovel(${idx})">
                    <div class="title">${displayName}</div>
                    <div class="count">${n.character_count} 个角色</div>
                </div>`;
            });
            el.innerHTML = html;
        }

        async function selectNovel(idx) {
            const n = novels[idx];
            if (!n) return;
            currentNovelDir = n.path;
            currentNovelName = n.name.replace('草稿_', '');
            selectedCharId = '';

            selectedCharName = '';
            history = '';
            renderNovelList();
            await loadCharacters();
        }

        async function loadCharacters() {
            if (!currentNovelDir) {
                document.getElementById('char-list').innerHTML = '<div class="empty-state">请先选择小说</div>';
                return;
            }
            document.getElementById('char-list').innerHTML = '<div class="loading">加载角色中...</div>';
            try {
                const r = await fetch('/api/roleplay/characters?novel_dir=' + encodeURIComponent(currentNovelDir));
                const d = await r.json();
                characters = d.characters || [];
                currentNovelName = d.novel_name || currentNovelName;
                renderCharList();
            } catch(e) {
                document.getElementById('char-list').innerHTML = '<div class="empty-state">无法加载角色列表</div>';
            }
        }

        function renderCharList() {
            const el = document.getElementById('char-list');
            if (!characters.length) {
                el.innerHTML = '<div class="empty-state">该小说暂无角色数据</div>';
                return;
            }
            let html = '';
            characters.forEach((c, idx) => {
                const cid = c.character_id || c.name;
                const selected = cid === selectedCharId ? 'selected' : '';
                const roleType = c.role_type || '';
                const identity = c.identity || '';
                html += `<div class="char-item ${selected}" data-cidx="${idx}" onclick="selectChar(${idx})">
                    <div class="name">${c.name}${roleType ? '<span class="role-badge">' + roleType + '</span>' : ''}</div>
                    <div class="info">${identity ? identity.substring(0, 30) : '未知身份'}</div>
                </div>`;
            });
            el.innerHTML = html;
        }

        function selectChar(idx) {
            const c = characters[idx];
            if (!c) return;
            selectedCharId = c.character_id || c.name;
            selectedCharName = c.name;
            renderCharList();
            document.getElementById('chat-area').innerHTML = `<div class="empty-state">已选择角色: ${c.name}，开始对话吧！</div>`;
            history = '';
            showCharDetail(idx);
        }

        function showCharDetail(idx) {
            const char = characters[idx];
            if (!char) return;
            const card = document.getElementById('char-detail-card');
            const detail = document.getElementById('char-detail');
            card.style.display = 'block';

            let html = `<div style="color:#a0a8ff; font-size:16px; font-weight:bold; margin-bottom:8px;">${char.name}</div>`;

            const fields = [
                ['身份', 'identity'], ['性格', 'personality'], ['能力', 'ability'],
                ['背景', 'background'], ['动机', 'motivation'], ['角色类型', 'role_type'],
                ['位置', 'location'], ['状态', 'status']
            ];

            fields.forEach(([label, key]) => {
                if (char[key]) {
                    html += `<div class="detail-row"><span class="key">${label}</span><span class="val">${char[key]}</span></div>`;
                }
            });

            if (char.attributes && typeof char.attributes === 'object') {
                html += '<div style="margin-top:8px; color:#888; font-size:12px;">属性:</div>';
                for (const [key, val] of Object.entries(char.attributes)) {
                    html += `<div class="detail-row"><span class="key">${key}</span><span class="val">${val}</span></div>`;
                }
            }

            if (char.relationships && char.relationships.length) {
                html += '<div style="margin-top:8px; color:#888; font-size:12px;">关系:</div>';
                char.relationships.slice(0, 5).forEach(r => {
                    html += `<div style="padding:2px 0 2px 8px; font-size:12px; color:#aaa;">${r.type || ''} → ${r.target || ''}</div>`;
                });
            }

            detail.innerHTML = html;
        }

        function setMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function addMessage(name, text, cls) {
            const chatArea = document.getElementById('chat-area');
            if (chatArea.querySelector('.empty-state')) chatArea.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.innerHTML = `<div class="name">${name}</div>${escapeHtml(text)}`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLoadingMessage(name) {
            const chatArea = document.getElementById('chat-area');
            const div = document.createElement('div');
            div.className = 'msg character';
            div.id = 'loading-msg';
            div.innerHTML = `<div class="name">${name}</div><span class="loading">思考中...</span>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoadingMessage() {
            const el = document.getElementById('loading-msg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            if (!selectedCharId) { alert('请先选择一个角色'); return; }
            if (isSending) return;
            const input = document.getElementById('user-input').value.trim();
            if (!input) return;

            isSending = true;
            document.getElementById('send-btn').disabled = true;
            addMessage('你', input, 'user');
            document.getElementById('user-input').value = '';
            const scene = document.getElementById('scene-context').value;
            addLoadingMessage(selectedCharName);

            try {
                const r = await fetch('/api/roleplay/dialogue', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        character_id: selectedCharId,
                        scene_context: scene,
                        user_input: input,
                        dialogue_history: history,
                        novel_dir: currentNovelDir
                    })
                });
                const d = await r.json();
                removeLoadingMessage();
                addMessage(selectedCharName, d.response, 'character');
                history += '\n你: ' + input + '\n' + selectedCharName + ': ' + d.response;
            } catch(e) {
                removeLoadingMessage();
                addMessage('系统', '错误: ' + e, 'user');
            } finally {
                isSending = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        async function sendMonologue() {
            if (!selectedCharId) { alert('请先选择一个角色'); return; }
            if (isSending) return;
            isSending = true;
            document.getElementById('monologue-btn').disabled = true;
            const scene = document.getElementById('scene-context').value;
            addLoadingMessage(selectedCharName + ' (内心)');

            try {
                const r = await fetch('/api/roleplay/monologue', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        character_id: selectedCharId,
                        situation: scene || '当前情境',
                        novel_dir: currentNovelDir
                    })
                });
                const d = await r.json();
                removeLoadingMessage();
                addMessage(selectedCharName + ' (内心)', d.monologue, 'character');
            } catch(e) {
                removeLoadingMessage();
                addMessage('系统', '错误: ' + e, 'user');
            } finally {
                isSending = false;
                document.getElementById('monologue-btn').disabled = false;
            }
        }

        async function resetSession() {
            if (!selectedCharId) return;
            try {
                await fetch('/api/roleplay/reset/' + encodeURIComponent(selectedCharId), {method: 'POST'});
            } catch(e) {}
            document.getElementById('chat-area').innerHTML = '<div class="empty-state">会话已重置</div>';
            history = '';
        }

        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loadNovels();

        const rpSocket = io(location.host, { transports: ['websocket'], reconnection: true, reconnectionDelay: 3000 });
        rpSocket.on('progress_update', (data) => {
            if (data.status === 'completed') {
                loadNovels();
            }
        });
    </script>
</body>
</html>
